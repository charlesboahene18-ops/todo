<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustDoIt App.</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <h1>JustDoIt.</h1>
      <p>Your no-excuses task list</p>
    </header>

    <div class="input-row">
      <input
        type="text"
        id="task-input"
        placeholder="What needs doing?"
        maxlength="200"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn-add" id="add-btn" title="Add task">ADD</button>
    </div>

    <div class="toast" id="toast"></div>

    <div class="stats" id="stats" style="display:none">
      <span><strong id="stat-total">0</strong> total</span>
      <span><strong id="stat-done">0</strong> done</span>
      <span><strong id="stat-left">0</strong> left</span>
    </div>

    <ul class="list" id="list"></ul>

    <div class="empty" id="empty">
      <span class="empty-glyph">✓</span>
      Nothing here yet
    </div>

  </div>

 <footer class="footer">
